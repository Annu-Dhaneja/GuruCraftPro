<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 100" width="250" height="100">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#818cf8"/>
        <stop offset="50%" stop-color="#c084fc"/>
        <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Modern 'G' Graphic Icon -->
  <g transform="translate(15, 66)">
    <circle cx="20" cy="-18" r="26" fill="url(#brandGrad)" fill-opacity="0.15" />
    <text font-family="system-ui, -apple-system, 'Inter', sans-serif" font-weight="900" font-size="52" fill="url(#brandGrad)" letter-spacing="-2">
      G
    </text>
    <!-- Geometric Accents -->
    <circle cx="44" cy="-44" r="4" fill="#6366f1" />
  </g>

  <!-- Pristine Typography (White matching Slate-200 / Slate-400) -->
  <text x="80" y="50" font-family="system-ui, -apple-system, 'Inter', sans-serif" font-weight="800" font-size="28" fill="#f8fafc" letter-spacing="-0.5">
    Gurucraft<tspan fill="#a855f7">Pro</tspan>
  </text>
  
  <text x="82" y="72" font-family="system-ui, -apple-system, 'Inter', sans-serif" font-weight="600" font-size="10" fill="#94a3b8" letter-spacing="2" text-transform="uppercase">
    Digital Experiences
  </text>
</svg>
